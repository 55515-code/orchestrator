projects:
  - slug: uv
    name: uv
    repo_url: https://github.com/astral-sh/uv
    docs_url: https://docs.astral.sh/uv/
    rationale: Fast Python runtime/package management with reproducible lock workflows.

  - slug: mise
    name: mise
    repo_url: https://github.com/jdx/mise
    docs_url: https://mise.jdx.dev/
    rationale: Cross-platform version-managed CLI tooling and task runtime.

  - slug: langgraph
    name: LangGraph
    repo_url: https://github.com/langchain-ai/langgraph
    docs_url: https://langchain-ai.github.io/langgraph/
    rationale: Structured orchestration for agent workflows with durable state patterns.

  - slug: fastapi
    name: FastAPI
    repo_url: https://github.com/fastapi/fastapi
    docs_url: https://fastapi.tiangolo.com/
    rationale: Lightweight async API and templating framework suitable for CLI-first ops tooling.

  - slug: caddy
    name: Caddy
    repo_url: https://github.com/caddyserver/caddy
    docs_url: https://caddyserver.com/docs/
    rationale: Open-source HTTPS reverse proxy for secure self-hosting with minimal ops overhead.

  - slug: cloudflared
    name: cloudflared
    repo_url: https://github.com/cloudflare/cloudflared
    docs_url: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
    rationale: Tunnel-based secure ingress option for no-domain or low-cost remote access.

  - slug: tailscale
    name: Tailscale
    repo_url: https://github.com/tailscale/tailscale
    docs_url: https://tailscale.com/kb/
    rationale: Encrypted mesh networking for private control panel access across distributed environments.

  - slug: chezmoi
    name: chezmoi
    repo_url: https://github.com/twpayne/chezmoi
    docs_url: https://www.chezmoi.io/
    rationale: Cross-platform config management and templating for portable user environments.

  - slug: yadm
    name: yadm
    repo_url: https://github.com/yadm-dev/yadm
    docs_url: https://yadm.io/docs/getting_started
    rationale: Git-backed config workflow with bootstrap hooks and lightweight setup.

  - slug: gnu-stow
    name: GNU Stow
    repo_url: https://git.savannah.gnu.org/cgit/stow.git
    docs_url: https://www.gnu.org/software/stow/manual/stow.html
    rationale: Standard symlink-farm approach for organizing configuration packages.

  - slug: syncthing
    name: Syncthing
    repo_url: https://github.com/syncthing/syncthing
    docs_url: https://docs.syncthing.net/
    rationale: Encrypted peer-to-peer sync for cross-device config distribution.

  - slug: restic
    name: restic
    repo_url: https://github.com/restic/restic
    docs_url: https://restic.readthedocs.io/en/stable/
    rationale: Encrypted snapshot backups with restore flows suited for config portability.

  - slug: rclone
    name: rclone
    repo_url: https://github.com/rclone/rclone
    docs_url: https://rclone.org/docs/
    rationale: Multi-provider sync/transfer tool for low-cost remote config replication.

  - slug: proton-mail
    name: Proton Mail
    repo_url: https://proton.me/support/imap-smtp-and-pop3-setup
    docs_url: https://proton.me/support/automatically-start-bridge
    rationale: Documented Bridge and CLI guidance for mail-client integration; no public general mail API is assumed.

  - slug: proton-drive
    name: Proton Drive
    repo_url: https://proton.me/blog/proton-drive-sdk-preview
    docs_url: https://proton.me/support/drive/proton-drive-for-business
    rationale: Official Drive support and SDK preview context for managed file-sync workflows.

  - slug: proton-vpn
    name: Proton VPN
    repo_url: https://proton.me/support/setup-vpn-business
    docs_url: https://proton.me/support/business/vpn
    rationale: Managed VPN deployment and business admin surfaces, with no assumed public consumer automation API.

  - slug: dokku
    name: Dokku
    repo_url: https://github.com/dokku/dokku
    docs_url: https://dokku.com/docs/
    rationale: Low-cost Heroku-like open-source PaaS pattern for affordable staged deployments.

  - slug: coolify
    name: Coolify
    repo_url: https://github.com/coollabsio/coolify
    docs_url: https://coolify.io/docs
    rationale: Self-hosted developer platform for affordable app deployment with Git-based automation.

  - slug: ducky-payloads
    name: USB Rubber Ducky Payloads
    repo_url: https://github.com/hak5/usbrubberducky-payloads
    docs_url: https://docs.hak5.org/hak5-usb-rubber-ducky/
    rationale: Community-maintained DuckyScript payload corpus and conventions for device-inspired workflow design.

  - slug: flipper-firmware
    name: Flipper Zero Firmware
    repo_url: https://github.com/flipperdevices/flipperzero-firmware
    docs_url: https://developer.flipper.net/flipperzero/
    rationale: Official source for Flipper file formats, BadUSB semantics, and device capability references.

  - slug: atomic-red-team
    name: Atomic Red Team
    repo_url: https://github.com/redcanaryco/atomic-red-team
    docs_url: https://github.com/redcanaryco/atomic-red-team
    rationale: ATT&CK-mapped atomic test content to avoid one-off bespoke validation routines.

  - slug: sigma
    name: Sigma Rules
    repo_url: https://github.com/SigmaHQ/sigma
    docs_url: https://sigmahq.io/
    rationale: Generic YAML detection rule standard for backend-agnostic detection content.

  - slug: nuclei-templates
    name: Nuclei Templates
    repo_url: https://github.com/projectdiscovery/nuclei-templates
    docs_url: https://docs.projectdiscovery.io/templates/introduction
    rationale: Maintained template ecosystem for repeatable security checks before custom scanner work.

  - slug: apktool
    name: Apktool
    repo_url: https://github.com/iBotPeaches/Apktool
    docs_url: https://apktool.org/
    rationale: Standard open-source Android APK decode/build flow used across app reverse workflows.

  - slug: jadx
    name: JADX
    repo_url: https://github.com/skylot/jadx
    docs_url: https://github.com/skylot/jadx
    rationale: Widely adopted Dex decompiler for Android static analysis pipelines.

  - slug: mobsf
    name: MobSF
    repo_url: https://github.com/MobSF/Mobile-Security-Framework-MobSF
    docs_url: https://github.com/MobSF/Mobile-Security-Framework-MobSF
    rationale: Open-source mobile application testing framework for first-pass Android/iOS security triage.

  - slug: frida
    name: Frida
    repo_url: https://github.com/frida/frida
    docs_url: https://frida.re/docs/
    rationale: Cross-platform dynamic instrumentation toolkit for runtime mobile and software analysis.

  - slug: owasp-mastg
    name: OWASP MASTG
    repo_url: https://github.com/OWASP/owasp-mastg
    docs_url: https://mas.owasp.org/
    rationale: Mobile AppSec testing guide and verification baseline for structured assessment coverage.
