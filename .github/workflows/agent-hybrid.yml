name: Agent Hybrid Automation

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: fast
        type: choice
        options:
          - fast
          - deep
          - release-readiness
      target_branch:
        description: "Base branch for rolling PR + merge target"
        required: false
        default: main
        type: string
      allow_write:
        description: "Allow automated branch/commit/push/merge via rolling PR"
        required: true
        default: true
        type: boolean
      loop_count:
        description: "Number of sequential loops for deep swarm mode (1..12)"
        required: false
        default: 6
        type: number
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  deterministic_checks:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'deep') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --python 3.12

      - name: Resolve mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MODE=${{ github.event.inputs.mode }}" >> "$GITHUB_ENV"
          else
            echo "MODE=fast" >> "$GITHUB_ENV"
          fi

      - name: Lint + static checks
        run: |
          uv run --with ruff ruff check substrate scripts tests
          uv run python -m compileall substrate scripts
          uv run python - <<'PY'
          from pathlib import Path
          from substrate.registry import SubstrateRuntime

          runtime = SubstrateRuntime(Path(".").resolve())
          print("workspace loaded:", runtime.root)
          print("repo count:", len(runtime.repositories()))
          PY

      - name: Tests (mode-aware)
        run: |
          if [ "${MODE}" = "release-readiness" ]; then
            uv run --with pytest --with httpx pytest -q tests
          else
            uv run --with pytest --with httpx pytest -q tests/studio/test_connection.py tests/studio/test_api.py
          fi

  deep_cycle:
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'deep') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync dependencies
        run: uv sync --python 3.12

      - name: Resolve dynamic routing context
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_BRANCH=${{ github.event.inputs.target_branch }}" >> "$GITHUB_ENV"
            echo "ALLOW_WRITE=${{ github.event.inputs.allow_write }}" >> "$GITHUB_ENV"
            echo "LOOP_COUNT=${{ github.event.inputs.loop_count }}" >> "$GITHUB_ENV"
          else
            echo "TARGET_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
            echo "ALLOW_WRITE=true" >> "$GITHUB_ENV"
            echo "LOOP_COUNT=6" >> "$GITHUB_ENV"
          fi

      - name: Run deep cloud-agent cycle with fallback
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/agent_hybrid_runner.py \
            --mode deep \
            --target-branch "${TARGET_BRANCH}" \
            --allow-write "${ALLOW_WRITE}" \
            --loop-count "${LOOP_COUNT}" \
            --merge-policy "safe_gate" \
            --retry-merge "1" \
            --summary-out artifacts/agent-hybrid/agent_summary.json \
            --report-out artifacts/agent-hybrid/agent_report.md

      - name: Upload deep-cycle artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-hybrid-${{ github.run_id }}
          path: artifacts/agent-hybrid
          if-no-files-found: warn
